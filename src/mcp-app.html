<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Structured Input — MCP App</title>
<style>
/* ===== HYBRID TOKENS: LIQUID GLASS + WARM UNDERTONE ===== */
:root {
  /* Warm undertone (Anthropic-inspired, not dominant) */
  --warm-near-black: #1a1918;
  --warm-charcoal: #3d3b38;
  --warm-mid: #57544f;
  --warm-stone: #7a7770;
  --warm-sand: #a8a49a;
  --warm-cream: #e8e5dc;
  --warm-ivory: #f5f3ed;
  --warm-white: #faf9f6;

  /* Accent: terracotta softened for glass context */
  --accent: #c96442;
  --accent-hover: #b85a3a;
  --accent-soft: rgba(201, 100, 66, 0.15);
  --accent-text: #faf9f6;

  /* Semantic */
  --danger: #c0392b;
  --danger-soft: rgba(192, 57, 43, 0.1);
  --focus: #3898ec;
  --focus-ring: rgba(56, 152, 236, 0.25);
  --success: #27ae60;

  /* ---- GLASS CORE ---- */
  --glass-bg: rgba(255, 255, 255, 0.22);
  --glass-bg-strong: rgba(255, 255, 255, 0.38);
  --glass-border: rgba(255, 255, 255, 0.35);
  --glass-border-subtle: rgba(255, 255, 255, 0.18);
  --glass-highlight: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(255,255,255,0.3);
  --glass-blur: 24px;
  --glass-saturate: 1.4;

  /* Inner surfaces — semi-translucent, glass-within-glass */
  --surface-input: rgba(255, 255, 255, 0.38);
  --surface-input-focus: rgba(255, 255, 255, 0.55);
  --surface-card: rgba(255, 255, 255, 0.35);
  --surface-card-hover: rgba(255, 255, 255, 0.42);
  --surface-chip: rgba(255, 255, 255, 0.28);
  --surface-chip-hover: rgba(255, 255, 255, 0.42);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  --font-serif: 'Georgia', 'Times New Roman', serif;
  --font-mono: 'SF Mono', ui-monospace, 'Cascadia Code', monospace;

  /* Dynamic spacing — scales with container */
  --sp-unit: clamp(12px, 2.5cqi, 18px);
  --sp-xs: calc(var(--sp-unit) * 0.3);
  --sp-sm: calc(var(--sp-unit) * 0.6);
  --sp-md: var(--sp-unit);
  --sp-lg: calc(var(--sp-unit) * 1.6);
  --sp-xl: calc(var(--sp-unit) * 2.2);

  /* Dynamic type — scales with container */
  --fs-xs: clamp(0.75rem, 1.8cqi, 0.8125rem);
  --fs-sm: clamp(0.75rem, 2cqi, 0.8125rem);
  --fs-base: clamp(0.8125rem, 2.4cqi, 0.9375rem);
  --fs-md: clamp(0.875rem, 2.6cqi, 1rem);
  --fs-lg: clamp(1rem, 3cqi, 1.25rem);
  --fs-xl: clamp(1.25rem, 3.8cqi, 1.5rem);

  /* Radii — scale with container */
  --radius-sm: clamp(6px, 1.2cqi, 8px);
  --radius-md: clamp(10px, 2cqi, 14px);
  --radius-lg: clamp(16px, 3cqi, 22px);
  --radius-pill: 9999px;

  /* Touch targets */
  --touch-min: clamp(44px, 8cqi, 48px);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
}

/* ===== BACKGROUND ===== */
body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: 1.55;
  color: var(--warm-charcoal);
  margin: 0;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Rich gradient background — the glass shows through this */
  background:
    radial-gradient(ellipse at 25% 15%, rgba(201,100,66,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 85%, rgba(56,152,236,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(39,174,96,0.04) 0%, transparent 60%),
    linear-gradient(145deg, #c8bfae 0%, #a09688 30%, #8b8578 50%, #a09890 70%, #c0b8aa 100%);
  background-attachment: fixed;
}

/* ===== OUTER SHELL — LIQUID GLASS ===== */
.form-shell {
  container-type: inline-size;
  container-name: form;
  width: 92vw;
  max-width: 480px;
  /* Height tied to width via aspect-ratio — capped by viewport + absolute max */
  aspect-ratio: 3 / 4;
  max-height: min(88vh, 88dvh, 560px);
  display: flex;
  flex-direction: column;
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  isolation: isolate;

  /* Glass material */
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
}

/* Specular sheen */
.form-shell::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(ellipse at 18% 8%, rgba(255,255,255,0.65), rgba(255,255,255,0.15) 32%, transparent 55%),
    linear-gradient(170deg, rgba(255,255,255,0.28) 0%, transparent 40%);
  pointer-events: none;
  z-index: 1;
}

/* Inner border highlight — specular rim */
.form-shell::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.5),
    inset 0 0 6px rgba(255,255,255,0.2);
  pointer-events: none;
  z-index: 1;
}

/* ===== INLINE HEADER (inside scroll body) ===== */
.form-header {
  margin-bottom: var(--sp-md);
  padding-bottom: var(--sp-md);
  border-bottom: 0.5px solid var(--glass-border-subtle);
}

.form-title {
  font-family: var(--font-serif);
  font-size: var(--fs-xl);
  font-weight: 500;
  color: var(--warm-near-black);
  line-height: 1.2;
  letter-spacing: -0.015em;
}

.form-description {
  font-size: var(--fs-sm);
  color: var(--warm-mid);
  line-height: 1.5;
  margin-top: var(--sp-xs);
}

/* ===== SCROLL AREA ===== */
.form-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  position: relative;
  z-index: 2;
  padding: var(--sp-lg) var(--sp-lg);
  -webkit-overflow-scrolling: touch;

  /* No edge mask needed — single scroll surface */
}

/* Scrollbar styling */
.form-body::-webkit-scrollbar { width: 4px; }
.form-body::-webkit-scrollbar-track { background: transparent; }
.form-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

/* No submit/cancel — LLM reads form state directly */

/* ===== FIELD GROUP ===== */
.field-group {
  margin-bottom: var(--sp-lg);
}

.field-label {
  display: block;
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--warm-charcoal);
  margin-bottom: var(--sp-sm);
  letter-spacing: 0.01em;
}

.field-label .req {
  color: var(--accent);
  margin-left: 2px;
}

.field-desc {
  font-size: var(--fs-xs);
  color: var(--warm-stone);
  margin-bottom: var(--sp-sm);
  line-height: 1.4;
}

/* ===== SECTION DIVIDER ===== */
.section-divider {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--warm-stone);
  margin: var(--sp-lg) 0 var(--sp-md);
  padding-bottom: var(--sp-xs);
  border-bottom: 0.5px solid rgba(255,255,255,0.2);
}

/* ===== TEXT / NUMBER / DATE INPUTS ===== */
.text-input, .num-input, .date-input {
  display: block;
  width: 100%;
  padding: var(--sp-sm) var(--sp-md);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: var(--radius-md);
  background: var(--surface-input);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--warm-near-black);
  font-family: inherit;
  font-size: var(--fs-base);
  line-height: 1.5;
  outline: none;
  transition: all 0.2s;
  min-height: var(--touch-min);
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
}

.text-input:focus, .num-input:focus, .date-input:focus {
  background: var(--surface-input-focus);
  border-color: var(--focus);
  box-shadow: 0 0 0 3px var(--focus-ring);
}

.text-input::placeholder { color: var(--warm-stone); }

textarea.text-input { resize: vertical; min-height: 80px; }

.num-input { max-width: clamp(100px, 30cqi, 150px); }

.num-row { display: flex; align-items: center; gap: var(--sp-sm); }
.num-unit { font-size: var(--fs-sm); color: var(--warm-mid); }

/* ===== SLIDER ===== */
.slider-wrap { display: flex; align-items: center; gap: var(--sp-md); }

.slider-track {
  flex: 1;
  position: relative;
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: var(--radius-pill);
  cursor: pointer;
}

.slider-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--accent);
  border-radius: var(--radius-pill);
  pointer-events: none;
}

.slider-thumb {
  position: absolute; top: 50%;
  width: clamp(18px, 4cqi, 24px);
  height: clamp(18px, 4cqi, 24px);
  border-radius: 50%;
  background: var(--warm-white);
  border: 2px solid var(--accent);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transform: translate(-50%, -50%);
  cursor: grab;
  touch-action: none;
  z-index: 2;
  transition: box-shadow 0.15s;
}

.slider-thumb:active { cursor: grabbing; box-shadow: 0 2px 14px rgba(201,100,66,0.35); }

.slider-val {
  width: clamp(56px, 14cqi, 72px);
  padding: var(--sp-sm) var(--sp-sm);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: var(--radius-sm);
  background: var(--surface-input);
  backdrop-filter: blur(6px);
  color: var(--warm-near-black);
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  text-align: center;
  outline: none;
  min-height: var(--touch-min);
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
}

.slider-val:focus { border-color: var(--focus); box-shadow: 0 0 0 2px var(--focus-ring); }

/* Range labels */
.range-labels {
  display: flex; justify-content: space-between; margin-top: var(--sp-xs);
  font-size: var(--fs-xs); font-family: var(--font-mono); color: var(--warm-mid);
}

/* ===== CHIPS ===== */
.chips { display: flex; flex-wrap: wrap; gap: var(--sp-sm); }

.chip {
  padding: var(--sp-xs) var(--sp-md);
  border-radius: var(--radius-pill);
  border: 1px solid rgba(255,255,255,0.22);
  background: var(--surface-chip);
  backdrop-filter: blur(8px);
  color: var(--warm-charcoal);
  font-family: inherit;
  font-size: var(--fs-sm);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  -webkit-user-select: none;
  white-space: nowrap;
  min-height: var(--touch-min);
  display: flex;
  align-items: center;
  touch-action: manipulation;
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
}

.chip:hover { background: var(--surface-chip-hover); }

.chip.sel {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(201,100,66,0.25);
}

/* ===== CHECKLIST ===== */
.checklist { list-style: none; }

.cl-header {
  font-size: var(--fs-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--warm-stone);
  padding: var(--sp-sm) 0 var(--sp-xs);
  border-bottom: 0.5px solid rgba(255,255,255,0.15);
  margin-bottom: var(--sp-xs);
  display: flex; justify-content: space-between; align-items: center;
}

.cl-action {
  font-size: var(--fs-xs); font-weight: 500; text-transform: none; letter-spacing: 0;
  color: var(--accent); cursor: pointer; background: none; border: none; font-family: inherit;
}

.cl-item {
  display: flex; align-items: center; gap: var(--sp-sm);
  padding: var(--sp-sm) var(--sp-sm);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
  min-height: var(--touch-min);
}

.cl-item:hover { background: rgba(255,255,255,0.15); }

.cl-box {
  width: clamp(16px, 3.5cqi, 20px); height: clamp(16px, 3.5cqi, 20px);
  border-radius: calc(var(--radius-sm) * 0.7);
  border: 1.5px solid var(--warm-sand);
  background: var(--surface-input);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.cl-item.on .cl-box { background: var(--accent); border-color: var(--accent); }
.cl-box svg { width: 12px; height: 12px; opacity: 0; transition: opacity 0.15s; }
.cl-item.on .cl-box svg { opacity: 1; }
.cl-label { font-size: var(--fs-base); flex: 1; }
.cl-meta { font-size: var(--fs-xs); font-family: var(--font-mono); color: var(--warm-stone);
  padding: 2px 6px; background: rgba(255,255,255,0.2); border-radius: var(--radius-sm); }

/* Content plate — frosted card */
.plate {
  background: var(--surface-card);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: var(--radius-md);
  padding: var(--sp-md);
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.5);
}

/* ===== RANKED LIST ===== */
.ranked { list-style: none; }

.ranked-item {
  display: flex; align-items: center; gap: var(--sp-sm);
  padding: var(--sp-sm) var(--sp-md);
  border-radius: var(--radius-md);
  background: var(--surface-card);
  border: 1px solid rgba(255,255,255,0.22);
  margin-bottom: var(--sp-sm);
  cursor: grab; touch-action: none;
  transition: box-shadow 0.2s, transform 0.15s;
  min-height: var(--touch-min);
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
}

.ranked-item:active { cursor: grabbing; box-shadow: 0 6px 20px rgba(0,0,0,0.15); transform: scale(1.01); }

.drag-handle { color: var(--warm-stone); display: flex; flex-shrink: 0; }

.rank-num {
  width: clamp(20px, 4cqi, 24px); height: clamp(20px, 4cqi, 24px);
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  color: var(--warm-mid);
  font-size: var(--fs-xs); font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

.ranked-label { flex: 1; font-size: var(--fs-base); }

.ranked-rm {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; background: transparent; color: var(--warm-stone);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.ranked-rm:hover { background: var(--danger-soft); color: var(--danger); }

/* ===== RATING ===== */
.rating { display: flex; gap: 4px; align-items: center; }

.star {
  width: clamp(36px, 7cqi, 44px); height: clamp(36px, 7cqi, 44px);
  cursor: pointer; transition: transform 0.15s;
  color: rgba(255,255,255,0.3); fill: currentColor;
}
.star:hover { transform: scale(1.15); }
.star.on { color: var(--accent); }
.star.hover { color: var(--accent-hover); }
.rating-lbl { margin-left: var(--sp-sm); font-size: var(--fs-sm); color: var(--warm-mid); font-family: var(--font-mono); }

/* ===== COLOR PICKER ===== */
.color-group { margin-bottom: var(--sp-md); }
.color-role { font-size: var(--fs-sm); font-weight: 600; color: var(--warm-charcoal); margin-bottom: var(--sp-sm); }
.swatches { display: flex; flex-wrap: wrap; gap: var(--sp-sm); }

.swatch {
  width: clamp(40px, 7cqi, 44px); height: clamp(40px, 7cqi, 44px);
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  cursor: pointer; transition: all 0.15s;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.08);
}
.swatch:hover { transform: scale(1.1); }
.swatch.sel {
  border-color: var(--warm-white);
  box-shadow: 0 0 0 2px var(--warm-near-black), inset 0 0 0 1px rgba(0,0,0,0.1);
}

.hex-in {
  width: 100px; padding: var(--sp-sm) var(--sp-md);
  border: 1px solid rgba(255,255,255,0.22); border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: var(--fs-sm);
  color: var(--warm-near-black); background: var(--surface-input);
  outline: none; margin-top: var(--sp-sm);
  min-height: 32px;
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
}
.hex-in:focus { border-color: var(--focus); }

/* ===== DATE ===== */
.date-input { max-width: clamp(140px, 40cqi, 200px); }
.date-range { display: flex; align-items: center; gap: var(--sp-sm); flex-wrap: wrap; }
.date-sep { color: var(--warm-stone); font-size: var(--fs-sm); }

/* ===== TOGGLE ===== */
.toggle-row { display: flex; align-items: center; gap: var(--sp-sm); }

.toggle {
  width: clamp(44px, 10cqi, 52px); height: clamp(26px, 6cqi, 32px);
  border-radius: var(--radius-pill);
  position: relative; cursor: pointer;
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.22);
  transition: background 0.25s, border-color 0.25s;
  flex-shrink: 0; touch-action: manipulation;
}

.toggle.on { background: var(--accent); border-color: var(--accent); }

.toggle-knob {
  position: absolute; top: 2px; left: 2px;
  width: calc(100% / 2 - 2px); height: calc(100% - 4px);
  border-radius: 50%; background: var(--warm-white);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.toggle.on .toggle-knob { transform: translateX(calc(100% + 2px)); }

.toggle-text { font-size: var(--fs-base); color: var(--warm-charcoal); }

/* ===== CONFIRM PANEL ===== */
.confirm {
  background: var(--surface-card);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: var(--radius-md);
  padding: var(--sp-md);
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.5);
}

.confirm-title {
  font-family: var(--font-serif); font-size: var(--fs-lg);
  font-weight: 500; color: var(--warm-near-black); margin-bottom: var(--sp-sm);
}

.confirm-preview {
  background: rgba(255,255,255,0.3);
  border-radius: var(--radius-sm); padding: var(--sp-sm) var(--sp-md);
  margin-bottom: var(--sp-md); border: 0.5px solid rgba(255,255,255,0.15);
}

.cp-row {
  display: flex; justify-content: space-between;
  padding: var(--sp-xs) 0; font-size: var(--fs-sm);
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
}
.cp-row:last-child { border-bottom: none; }
.cp-key { color: var(--warm-mid); }
.cp-val { color: var(--warm-near-black); font-weight: 600; }

.confirm-btns { display: flex; gap: var(--sp-sm); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: var(--sp-sm) var(--sp-lg);
  border-radius: var(--radius-md);
  font-family: inherit; font-size: var(--fs-base); font-weight: 600;
  cursor: pointer; border: none;
  transition: all 0.2s; min-height: var(--touch-min);
  touch-action: manipulation; flex: 1;
}

.btn-primary {
  background: var(--accent); color: var(--accent-text);
  box-shadow: 0 2px 12px rgba(201,100,66,0.25);
}
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(201,100,66,0.3); }
.btn-primary:active { transform: scale(0.98); }

.btn-ghost {
  background: rgba(255,255,255,0.15); color: var(--warm-charcoal);
  border: 0.5px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
}
.btn-ghost:hover { background: rgba(255,255,255,0.28); }

.btn-danger {
  background: var(--danger); color: var(--accent-text);
  box-shadow: 0 2px 10px rgba(192,57,43,0.2);
}
.btn-danger:hover { background: #a93226; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: var(--sp-lg); left: 50%;
  transform: translateX(-50%) translateY(120px);
  padding: var(--sp-sm) var(--sp-lg);
  border-radius: var(--radius-pill);
  background: rgba(26,25,24,0.85);
  backdrop-filter: blur(12px);
  color: var(--warm-white); font-size: var(--fs-sm); font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== RESPONSIVE ===== */
@container form (max-width: 360px) {
  .date-range { flex-direction: column; align-items: stretch; }
  .date-input { max-width: 100%; }
  .date-sep { padding: var(--sp-xs) 0; font-weight: 600; text-align: center; }
  .confirm-btns { flex-direction: column; gap: var(--sp-md); }
}

@media (max-width: 480px) {

  .form-shell {
    width: 100vw; max-width: 100vw;
    aspect-ratio: 3 / 4;
    max-height: 100vh; max-height: 100dvh;
    border-radius: 0;

@media (min-width: 481px) {

<body>

<div class="form-shell" id="formApp">
  <div class="form-body" id="formBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== SVG ICONS =====
const ICONS = {
  check: '<svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  drag: '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="4" r="1.5"/><circle cx="11" cy="4" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="12" r="1.5"/><circle cx="11" cy="12" r="1.5"/></svg>',
  close: '<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>',
  star: '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>',
};

// ===== STATE =====
const state = {};

// ===== FIELD RENDERERS =====
const R = {
  text(f) {
    const inp = el('input', { type: 'text', className: 'text-input', id: 'f-' + f.id, placeholder: f.placeholder || '', maxLength: f.maxLength || '' });
    if (f.default) inp.value = f.default;
    state[f.id] = () => inp.value;
    return inp;
  },

  longtext(f) {
    const ta = el('textarea', { className: 'text-input', id: 'f-' + f.id, placeholder: f.placeholder || '', rows: f.rows || 3 });
    if (f.default) ta.value = f.default;
    state[f.id] = () => ta.value;
    return ta;
  },

  number(f) {
    const wrap = el('div', { className: 'num-row' });
    const inp = el('input', { type: 'number', className: 'num-input', id: 'f-' + f.id, min: f.min ?? '', max: f.max ?? '', step: f.step ?? 1, value: f.default ?? '' });
    wrap.appendChild(inp);
    if (f.unit) wrap.appendChild(el('span', { className: 'num-unit', textContent: f.unit }));
    state[f.id] = () => inp.value === '' ? null : +inp.value;
    return wrap;
  },

  slider(f) {
    const mn = f.min, mx = f.max, st = f.step || 1;
    const def = f.default ?? mn;
    const pct = ((def - mn) / (mx - mn)) * 100;
    const wrap = el('div', { className: 'slider-wrap' });
    const track = el('div', { className: 'slider-track' });
    track.dataset.min = mn; track.dataset.max = mx; track.dataset.step = st;
    const fill = el('div', { className: 'slider-fill' }); fill.style.width = pct + '%';
    const thumb = el('div', { className: 'slider-thumb' }); thumb.style.left = pct + '%';
    track.append(fill, thumb);
    const vi = el('input', { type: 'number', className: 'slider-val', min: mn, max: mx, step: st, value: def.toFixed(st < 1 ? 1 : 0) });
    wrap.append(track, vi);
    initSlider(wrap);
    state[f.id] = () => +vi.value;
    return wrap;
  },

  range(f) {
    const mn = f.min, mx = f.max, st = f.step || 1;
    const defs = f.default || [mn + (mx - mn) * 0.25, mn + (mx - mn) * 0.75];
    const p0 = ((defs[0] - mn) / (mx - mn)) * 100, p1 = ((defs[1] - mn) / (mx - mn)) * 100;
    const wrap = el('div', { className: 'range-wrap' });
    const track = el('div', { className: 'slider-track' });
    track.dataset.min = mn; track.dataset.max = mx; track.dataset.step = st;
    const fill = el('div', { className: 'slider-fill' }); fill.style.left = p0 + '%'; fill.style.width = (p1 - p0) + '%';
    const t0 = el('div', { className: 'slider-thumb' }); t0.style.left = p0 + '%'; t0.dataset.role = 'min';
    const t1 = el('div', { className: 'slider-thumb' }); t1.style.left = p1 + '%'; t1.dataset.role = 'max';
    track.append(fill, t0, t1);
    const labels = el('div', { className: 'range-labels' });
    const lMin = el('span', { textContent: Math.round(defs[0]) });
    const lMax = el('span', { textContent: Math.round(defs[1]) });
    labels.append(lMin, lMax);
    wrap.append(track, labels);
    initRange(wrap, defs, lMin, lMax);
    state[f.id] = () => ({ min: +lMin.textContent, max: +lMax.textContent });
    return wrap;
  },

  'single-select'(f) {
    const wrap = el('div', { className: 'chips' }); wrap.dataset.mode = 'single';
    f.options.forEach(o => {
      const c = el('div', { className: 'chip' + (f.default === o.value ? ' sel' : ''), textContent: o.label });
      c.dataset.value = o.value;
      c.addEventListener('click', () => { wrap.querySelectorAll('.chip').forEach(x => x.classList.remove('sel')); c.classList.add('sel'); });
      wrap.appendChild(c);
    });
    state[f.id] = () => wrap.querySelector('.sel')?.dataset.value ?? null;
    return wrap;
  },

  'multi-select'(f) {
    const defs = f.default || [];
    const wrap = el('div', { className: 'chips' }); wrap.dataset.mode = 'multi';
    f.options.forEach(o => {
      const c = el('div', { className: 'chip' + (defs.includes(o.value) ? ' sel' : ''), textContent: o.label });
      c.dataset.value = o.value;
      c.addEventListener('click', () => c.classList.toggle('sel'));
      wrap.appendChild(c);
    });
    state[f.id] = () => [...wrap.querySelectorAll('.sel')].map(c => c.dataset.value);
    return wrap;
  },

  checklist(f) {
    const defs = f.default || [];
    const plate = el('div', { className: 'plate' });
    // Group items
    const groups = {};
    f.items.forEach(it => { const g = it.group || ''; (groups[g] = groups[g] || []).push(it); });
    Object.entries(groups).forEach(([gName, items]) => {
      if (gName || f.showSelectAll) {
        const hdr = el('div', { className: 'cl-header' });
        hdr.appendChild(el('span', { textContent: gName || 'Items' }));
        if (f.showSelectAll) {
          const btn = el('button', { className: 'cl-action', textContent: 'Select all' });
          btn.addEventListener('click', () => {
            const lis = plate.querySelectorAll('.cl-item');
            const allOn = [...lis].every(l => l.classList.contains('on'));
            lis.forEach(l => allOn ? l.classList.remove('on') : l.classList.add('on'));
            btn.textContent = allOn ? 'Select all' : 'Deselect all';
          });
          hdr.appendChild(btn);
        }
        plate.appendChild(hdr);
      }
      const ul = el('ul', { className: 'checklist' });
      items.forEach(it => {
        const li = el('li', { className: 'cl-item' + (defs.includes(it.id) ? ' on' : '') });
        li.dataset.id = it.id;
        li.addEventListener('click', () => li.classList.toggle('on'));
        const box = el('div', { className: 'cl-box' }); box.innerHTML = ICONS.check;
        li.appendChild(box);
        li.appendChild(el('span', { className: 'cl-label', textContent: it.label }));
        if (it.preview) li.appendChild(el('span', { className: 'cl-meta', textContent: it.preview }));
        ul.appendChild(li);
      });
      plate.appendChild(ul);
    });
    state[f.id] = () => [...plate.querySelectorAll('.cl-item.on')].map(l => l.dataset.id);
    return plate;
  },

  ranked(f) {
    const ul = el('ul', { className: 'ranked' });
    f.items.forEach((it, i) => {
      const li = el('li', { className: 'ranked-item' + (it.locked ? ' locked' : '') });
      li.dataset.id = it.id;
      if (!it.locked) li.draggable = true;
      const handle = el('div', { className: 'drag-handle' }); handle.innerHTML = ICONS.drag;
      const num = el('div', { className: 'rank-num', textContent: i + 1 });
      const label = el('span', { className: 'ranked-label', textContent: it.label });
      li.append(handle, num, label);
      if (f.removable && !it.locked) {
        const rm = el('button', { className: 'ranked-rm' }); rm.innerHTML = ICONS.close;
        rm.addEventListener('click', () => { li.remove(); renum(ul); });
        li.appendChild(rm);
      }
      ul.appendChild(li);
    });
    initDrag(ul);
    state[f.id] = () => [...ul.querySelectorAll('.ranked-item')].map(l => l.dataset.id);
    return ul;
  },

  rating(f) {
    const max = f.max || 5;
    const def = f.default || 0;
    const wrap = el('div', { className: 'rating' });
    const lbl = el('span', { className: 'rating-lbl', textContent: def + '/' + max });
    for (let i = 1; i <= max; i++) {
      const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      s.setAttribute('viewBox', '0 0 24 24');
      s.classList.add('star');
      if (i <= def) s.classList.add('on');
      s.dataset.v = i;
      s.innerHTML = ICONS.star;
      s.addEventListener('click', () => {
        const v = +s.dataset.v;
        wrap.querySelectorAll('.star').forEach(x => x.classList.toggle('on', +x.dataset.v <= v));
        lbl.textContent = v + '/' + max;
      });
      s.addEventListener('mouseenter', () => {
        const v = +s.dataset.v;
        wrap.querySelectorAll('.star').forEach(x => x.classList.toggle('hover', +x.dataset.v <= v));
      });
      wrap.appendChild(s);
    }
    wrap.addEventListener('mouseleave', () => wrap.querySelectorAll('.star').forEach(x => x.classList.remove('hover')));
    wrap.appendChild(lbl);
    state[f.id] = () => wrap.querySelectorAll('.star.on').length;
    return wrap;
  },

  color(f) {
    const frag = document.createDocumentFragment();
    f.roles.forEach(role => {
      const group = el('div', { className: 'color-group' });
      group.appendChild(el('div', { className: 'color-role', textContent: role.label }));
      const sw = el('div', { className: 'swatches' }); sw.dataset.role = role.role;
      role.swatches.forEach((hex, i) => {
        const s = el('div', { className: 'swatch' + (i === 0 ? ' sel' : '') });
        s.style.background = hex; s.dataset.c = hex;
        s.addEventListener('click', () => {
          sw.querySelectorAll('.swatch').forEach(x => x.classList.remove('sel'));
          s.classList.add('sel');
          const hi = group.querySelector('.hex-in');
          if (hi) hi.value = hex;
        });
        sw.appendChild(s);
      });
      group.appendChild(sw);
      if (role.allowCustom) {
        const hi = el('input', { type: 'text', className: 'hex-in', value: role.swatches[0] || '', placeholder: '#hex' });
        group.appendChild(hi);
      }
      frag.appendChild(group);
      state[f.id + '.' + role.role] = () => sw.querySelector('.sel')?.dataset.c || group.querySelector('.hex-in')?.value || null;
    });
    // Aggregate getter
    state[f.id] = () => {
      const out = {};
      f.roles.forEach(r => { out[r.role] = state[f.id + '.' + r.role](); });
      return out;
    };
    return frag;
  },

  date(f) {
    const inp = el('input', { type: 'date', className: 'date-input', id: 'f-' + f.id, value: f.default || '' });
    state[f.id] = () => inp.value || null;
    return inp;
  },

  'date-range'(f) {
    const defs = f.default || {};
    const wrap = el('div', { className: 'date-range' });
    const ds = el('input', { type: 'date', className: 'date-input', value: defs.start || '' });
    const sep = el('span', { className: 'date-sep', textContent: 'to' });
    const de = el('input', { type: 'date', className: 'date-input', value: defs.end || '' });
    wrap.append(ds, sep, de);
    state[f.id] = () => ({ start: ds.value || null, end: de.value || null });
    return wrap;
  },

  boolean(f) {
    const wrap = el('div', { className: 'toggle-row' });
    const tog = el('div', { className: 'toggle' + (f.default ? ' on' : '') });
    tog.appendChild(el('div', { className: 'toggle-knob' }));
    tog.addEventListener('click', () => tog.classList.toggle('on'));
    wrap.append(tog, el('span', { className: 'toggle-text', textContent: f.label }));
    state[f.id] = () => tog.classList.contains('on');
    return wrap;
  },

  confirm(f) {
    const panel = el('div', { className: 'confirm' });
    panel.appendChild(el('div', { className: 'confirm-title', textContent: f.title }));
    const preview = el('div', { className: 'confirm-preview' });
    (f.preview || []).forEach(p => {
      const row = el('div', { className: 'cp-row' });
      row.append(el('span', { className: 'cp-key', textContent: p.key }), el('span', { className: 'cp-val', textContent: p.value }));
      preview.appendChild(row);
    });
    panel.appendChild(preview);
    const btns = el('div', { className: 'confirm-btns' });
    let confirmed = null;
    const bConfirm = el('button', { className: 'btn btn-danger', textContent: f.confirmLabel || 'Confirm' });
    const bCancel = el('button', { className: 'btn btn-ghost', textContent: f.cancelLabel || 'Cancel' });
    bConfirm.addEventListener('click', () => { confirmed = true; toast(f.confirmLabel || 'Confirmed'); });
    bCancel.addEventListener('click', () => { confirmed = false; toast(f.cancelLabel || 'Cancelled'); });
    btns.append(bConfirm, bCancel);
    panel.appendChild(btns);
    state[f.id] = () => confirmed;
    return panel;
  },
};

// ===== HELPERS =====
function el(tag, props = {}) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => { if (v !== '' && v !== undefined) e[k] = v; });
  return e;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== SLIDER INIT =====
function initSlider(wrap) {
  const tr = wrap.querySelector('.slider-track'), fl = wrap.querySelector('.slider-fill'),
        th = wrap.querySelector('.slider-thumb'), vi = wrap.querySelector('.slider-val');
  const mn = +tr.dataset.min, mx = +tr.dataset.max, st = +tr.dataset.step;
  function set(p) {
    p = Math.max(0, Math.min(1, p));
    let v = Math.round((mn + p * (mx - mn)) / st) * st;
    p = (v - mn) / (mx - mn);
    fl.style.width = p * 100 + '%'; th.style.left = p * 100 + '%';
    vi.value = v.toFixed(st < 1 ? 1 : 0);
  }
  function ptr(e) { const r = tr.getBoundingClientRect(); set(((e.clientX || e.touches?.[0]?.clientX) - r.left) / r.width); }
  let d = false;
  th.addEventListener('pointerdown', e => { d = true; e.preventDefault(); th.setPointerCapture(e.pointerId); });
  th.addEventListener('pointermove', e => { if (d) ptr(e); });
  th.addEventListener('pointerup', () => d = false);
  tr.addEventListener('click', ptr);
  vi.addEventListener('change', () => { let v = Math.max(mn, Math.min(mx, +vi.value)); set((v - mn) / (mx - mn)); });
}

function initRange(wrap, defs, lMin, lMax) {
  const tr = wrap.querySelector('.slider-track'), fl = wrap.querySelector('.slider-fill'),
        ths = wrap.querySelectorAll('.slider-thumb');
  const mn = +tr.dataset.min, mx = +tr.dataset.max, st = +tr.dataset.step;
  const vals = [...defs];
  function upd() {
    const p0 = (vals[0] - mn) / (mx - mn) * 100, p1 = (vals[1] - mn) / (mx - mn) * 100;
    fl.style.left = p0 + '%'; fl.style.width = (p1 - p0) + '%';
    ths[0].style.left = p0 + '%'; ths[1].style.left = p1 + '%';
    lMin.textContent = Math.round(vals[0]); lMax.textContent = Math.round(vals[1]);
  }
  ths.forEach((th, i) => {
    let d = false;
    th.addEventListener('pointerdown', e => { d = true; e.preventDefault(); th.setPointerCapture(e.pointerId); });
    th.addEventListener('pointermove', e => {
      if (!d) return;
      const r = tr.getBoundingClientRect(), p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      let v = Math.round((mn + p * (mx - mn)) / st) * st;
      if (i === 0) v = Math.min(v, vals[1] - st); else v = Math.max(v, vals[0] + st);
      vals[i] = v; upd();
    });
    th.addEventListener('pointerup', () => d = false);
  });
}

// ===== DRAG INIT =====
function initDrag(ul) {
  let dragEl = null;
  ul.querySelectorAll('.ranked-item:not(.locked)').forEach(item => {
    item.addEventListener('dragstart', e => { dragEl = item; item.style.opacity = '0.4'; e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', () => { item.style.opacity = '1'; dragEl = null; renum(ul); });
    item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (dragEl && dragEl !== item) {
        const items = [...ul.children], fi = items.indexOf(dragEl), ti = items.indexOf(item);
        fi < ti ? item.after(dragEl) : item.before(dragEl);
      }
      renum(ul);
    });
    item.addEventListener('touchstart', () => { dragEl = item; }, { passive: true });
    item.addEventListener('touchmove', e => {
      if (!dragEl) return; e.preventDefault();
      const t = e.touches[0];
      for (const o of [...ul.children]) {
        if (o === dragEl) continue;
        const r = o.getBoundingClientRect(), m = r.top + r.height / 2;
        if (t.clientY < m && o.compareDocumentPosition(dragEl) & 4) { o.before(dragEl); break; }
        if (t.clientY > m && o.compareDocumentPosition(dragEl) & 2) { o.after(dragEl); break; }
      }
    }, { passive: false });
    item.addEventListener('touchend', () => { dragEl = null; renum(ul); });
  });
}
function renum(ul) { ul.querySelectorAll('.rank-num').forEach((n, i) => n.textContent = i + 1); }

// ===== RENDER FORM FROM SCHEMA =====
function renderForm(schema) {
  const body = document.getElementById('formBody');
  body.innerHTML = '';

  // Header
  if (schema.title || schema.description) {
    const hdr = el('div', { className: 'form-header' });
    if (schema.title) hdr.appendChild(el('h1', { className: 'form-title', textContent: schema.title }));
    if (schema.description) hdr.appendChild(el('p', { className: 'form-description', textContent: schema.description }));
    body.appendChild(hdr);
  }

  // Fields
  schema.fields.forEach(f => {
    const renderer = R[f.type];
    if (!renderer) { console.warn('Unknown field type:', f.type); return; }

    // Boolean renders its own label inside the toggle-row
    if (f.type === 'boolean') {
      const group = el('div', { className: 'field-group' });
      group.appendChild(renderer(f));
      body.appendChild(group);
      return;
    }

    const group = el('div', { className: 'field-group' });
    if (f.label && f.type !== 'confirm') {
      const lbl = el('label', { className: 'field-label' });
      lbl.textContent = f.label;
      if (f.required) { const req = el('span', { className: 'req', textContent: ' *' }); lbl.appendChild(req); }
      group.appendChild(lbl);
    }
    if (f.description && f.type !== 'confirm') group.appendChild(el('p', { className: 'field-desc', textContent: f.description }));
    group.appendChild(renderer(f));
    body.appendChild(group);
  });
}

// ===== GET ALL VALUES =====
function getValues() {
  const values = {};
  Object.entries(state).forEach(([k, getter]) => {
    if (!k.includes('.')) values[k] = getter();
  });
  return values;
}

// ===== MCP APP BRIDGE =====
window.addEventListener('message', (e) => {
  if (e.data?.type === 'tool-call' && e.data?.data) {
    try {
      const schema = typeof e.data.data === 'string' ? JSON.parse(e.data.data) : e.data.data;
      renderForm(schema);
    } catch (err) { console.error('Schema parse error:', err); }
  }
  if (e.data?.type === 'get-values') {
    window.parent.postMessage({ type: 'form-values', values: getValues() }, '*');
  }
});

// Notify host we're ready
window.parent.postMessage({ type: 'app-ready' }, '*');
